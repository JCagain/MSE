# Serial
serial.port=/dev/ttyUSB0

# Timing
heartbeat.interval.ms=5000
node.timeout.ms=20000
broadcast.interval.ms=3000

# Dashboard
dashboard.port=8080

# External notification (distress)
sms.recipients=
api.endpoint=
api.timeout.ms=5000
controller.distress.notification.retry.interval.ms=10000

# Twilio (leave blank to disable SMS)
twilio.account.sid=
twilio.auth.token=
twilio.from.number=

# Network
cellular.fallback.enabled=false

# Passability thresholds
passability.temperature.threshold=60.0
passability.gas.threshold=0.5

# Simulator
mesh.fallback.min.coverage.pct=50
# Comma-separated node IDs handled by real hardware (simulator skips these)
hardware.nodes=
